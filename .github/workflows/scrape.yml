name: Auto News Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 準備工作：安裝爬蟲工具、畫圖工具與中文字體
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk
        pip install requests beautifulsoup4 lxml jieba wordcloud matplotlib

    # 任務一：叫爬蟲小弟去抓新聞
    - env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        DATABASE_ID: ${{ secrets.DATABASE_ID }}
      run: python scraper.py

    # 任務二：叫畫圖小妹讀取抓下來的新聞畫出文字雲
    - run: python draw_cloud.py

   # 任務三：把更新的文字檔與「output資料夾」一起存回 GitHub
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        # 這裡最關鍵！要把個別的檔名刪掉，改成資料夾路徑
        git add result.txt output/
        git commit -m "Auto-update news and images in folders" || exit 0
        git push
